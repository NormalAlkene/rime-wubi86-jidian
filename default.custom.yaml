
patch:
  schema_list:
    - schema: wubi86_jidian             # 五笔
    - schema: wubi86_jidian_trad        # 五笔 - 简入繁出
    - schema: pinyin_simp               # 普通拼音

  menu:
    page_size: 5                    # 候选词数量，最多支持 10 个
  switcher:
    hotkeys:
      - "Shift+Control+grave"
      - "Control+0"
      - "Shift+Control+0"
    abbreviate_options: true
    caption: "【输入法设置】"
    option_list_separator: "｜"

  "style/horizontal": true

  #-----------------------------------------------
  # 中英文切换自定义
  #-----------------------------------------------
  # inline_ascii  在输入法的临时英文编辑区内输入字母，数字，符号，空格等，回车上屏后自动复位到中文
  # commit_text   已输入的候选文字上屏并切换至英文输入模式
  # commit_code   已输入的编码字符上屏并切换至英文输入模式
  # -----------------------------------------------
  # 参考链接： https://gist.github.com/lotem/2981316

  ascii_composer:
    good_old_caps_lock: true       # true: 在保持 cap 键原有的特征， false: 点击不会切换大小写
    switch_key:
      Caps_Lock: commit_code
      "Control+space": commit_code
      Shift_L: noop
      Shift_R: commit_code
      Control_L: noop
      Control_R: noop

  key_binder:
    bindings:
      - {accept: "Tab", send: Down, when: has_menu}
      - {accept: ISO_Left_Tab, send: Down, when: has_menu}
      - {accept: "Shift+Tab", send: Up, when: has_menu}
      - {accept: "Shift+ISO_Left_Tab", send: Up, when: has_menu} # Fix Shift+Tab on Linux
      - {accept: "Right", send: Down, when: composing}
      - {accept: "Left", send: Up, when: composing}
      - {accept: "Down", send: Page_Down, when: has_menu}
      - {accept: "Up", send: Page_Up, when: has_menu}
      - {accept: "Shift+space", toggle: full_shape, when: always}
      - {accept: "Control+period", toggle: ascii_punct, when: always}
      - {accept: "Control+space", toggle: ascii_mode, when: always}
  punctuator:
    full_shape: # 全角符号
      # commit 的意思是这个符号输入时，会将当前处于第一位的候选词上屏
      " ": {commit: "　"}
      "!": {commit: "！"}
      "\"": {pair: ["“", "”"]}
      "#": "＃"
      "$": ["￥", "$", "€", "£", "¥", "¢", "¤"]
      "%": "％"
      "&": "＆"
      "'": {pair: ["‘", "’"]}
      "(": "（"
      ")": "）"
      "*": ["＊", "·", "・", "×", "※", "❂"]
      "+": "＋"
      ",": {commit: "，"}
      "-": "－"
      .: {commit: "。"}
      "/": ["／", "÷"]
      ":": {commit: "："}
      ";": {commit: "；"}
      "<": ["《", "〈", "«", "‹"]
      "=": "＝"
      ">": ["》", "〉", "»", "›"]
      "?": {commit: "？"}
      "@": "＠"
      "[": ["「", "【", "〔", "［"]
      "\\": ["、", "＼"]
      "]": ["」", "】", "〕", "］"]
      "^": {commit: "……"}
      _: "——"
      "`": "｀"
      "{": ["『", "〖", "｛"]
      "|": ["·", "｜", "§", "¦"]
      "}": ["』", "〗", "｝"]
      "~": "～"
    half_shape: # 半角符号
      "!": {commit: "！"}
      "'": {pair: ["‘", "’"]}
      "\"": {pair: ["“", "”"]}
      "(": "（"
      ")": "）"
      ",": {commit: "，"}
      .: {commit: "。"}
      "/": "、"
      ":": {commit: "："}
      ";": {commit: "；"}
      "<": {commit: "《"}
      ">": {commit: "》"}
      "?": {commit: "？"}
      "[": {commit: "【"}
      "]": {commit: "】"}
      "^": {commit: "……"}
      _: "——"
      "`": "·"
      "`": "`"
      "{": "「"
      "|": "|"
      "}": "」"
      "~": "~"
  recognizer:
    patterns:  # 一些常见的英文组合，当正则匹配到这些时，都不会生成候选词，而只输入英文
      email: "^[-_.0-9A-Za-z]+@.*$"
      uppercase: "[A-Z][-_+.'0-9A-Za-z]*$"
      url: "^(www[.]|https?:|ftp[.:]|mailto:|file:|localhost).*$|^[a-z]+[.].+$"

